<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Paycheck Calculator Widget — TrueTakeHomePay</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fff; color: #1e293b; padding: 20px; }
    h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 16px; text-align: center; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 4px; color: #475569; }
    input, select { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.875rem; color: #1e293b; background: #fff; }
    input:focus, select:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
    .row { display: flex; gap: 12px; }
    .row > * { flex: 1; }
    .result { margin-top: 20px; padding: 16px; background: #f0f9ff; border-radius: 12px; text-align: center; }
    .result-amount { font-size: 1.75rem; font-weight: 800; color: #1d4ed8; }
    .result-label { font-size: 0.75rem; color: #64748b; margin-top: 2px; }
    .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    .result-item { background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; text-align: center; }
    .result-item .val { font-size: 0.9rem; font-weight: 600; color: #1e293b; }
    .result-item .lbl { font-size: 0.65rem; color: #94a3b8; }
    .powered { text-align: center; margin-top: 16px; font-size: 0.7rem; color: #94a3b8; }
    .powered a { color: #3b82f6; text-decoration: none; }
    .powered a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h2>Paycheck Calculator</h2>
  <div class="form-group">
    <label for="salary">Annual Salary ($)</label>
    <input id="salary" type="text" inputmode="decimal" value="75,000" />
  </div>
  <div class="row">
    <div class="form-group">
      <label for="filing">Filing Status</label>
      <select id="filing">
        <option value="single">Single</option>
        <option value="married">Married Filing Jointly</option>
        <option value="hoh">Head of Household</option>
      </select>
    </div>
    <div class="form-group">
      <label for="freq">Pay Frequency</label>
      <select id="freq">
        <option value="26">Bi-weekly</option>
        <option value="24">Semi-monthly</option>
        <option value="12">Monthly</option>
        <option value="52">Weekly</option>
      </select>
    </div>
  </div>

  <div class="result" id="result">
    <div class="result-amount" id="take-home">$0</div>
    <div class="result-label">Estimated take-home per paycheck</div>
    <div class="result-grid">
      <div class="result-item"><div class="val" id="fed-tax">$0</div><div class="lbl">Federal Tax</div></div>
      <div class="result-item"><div class="val" id="fica-tax">$0</div><div class="lbl">FICA</div></div>
    </div>
  </div>

  <div class="powered">
    Powered by <a href="https://truetakehomepay.com/" target="_blank" rel="noopener">True Take Home Pay</a>
  </div>

  <script>
    const brackets2026 = {
      single: [
        [11925, 0.10], [48475, 0.12], [103350, 0.22],
        [197300, 0.24], [250525, 0.32], [626350, 0.35], [Infinity, 0.37]
      ],
      married: [
        [23850, 0.10], [96950, 0.12], [206700, 0.22],
        [394600, 0.24], [501050, 0.32], [751600, 0.35], [Infinity, 0.37]
      ],
      hoh: [
        [17000, 0.10], [64850, 0.12], [103350, 0.22],
        [197300, 0.24], [250525, 0.32], [626350, 0.35], [Infinity, 0.37]
      ]
    };
    const stdDed = { single: 15700, married: 31400, hoh: 22500 };
    const ssWageBase = 176100;

    function calcFedTax(taxableIncome, filing) {
      const bk = brackets2026[filing];
      let tax = 0, prev = 0;
      for (const [limit, rate] of bk) {
        if (taxableIncome <= prev) break;
        const chunk = Math.min(taxableIncome, limit) - prev;
        tax += chunk * rate;
        prev = limit;
      }
      return tax;
    }

    function fmt(n) {
      return '$' + Math.round(n).toLocaleString('en-US');
    }

    function update() {
      const raw = document.getElementById('salary').value.replace(/[^0-9.]/g, '');
      const salary = parseFloat(raw) || 0;
      const filing = document.getElementById('filing').value;
      const periods = parseInt(document.getElementById('freq').value, 10);

      const taxable = Math.max(0, salary - stdDed[filing]);
      const fedTax = calcFedTax(taxable, filing);
      const ss = Math.min(salary, ssWageBase) * 0.062;
      const medicare = salary * 0.0145 + Math.max(0, salary - 200000) * 0.009;
      const fica = ss + medicare;
      const totalTax = fedTax + fica;
      const net = salary - totalTax;
      const perPeriod = net / periods;

      document.getElementById('take-home').textContent = fmt(perPeriod);
      document.getElementById('fed-tax').textContent = fmt(fedTax / periods);
      document.getElementById('fica-tax').textContent = fmt(fica / periods);
    }

    document.getElementById('salary').addEventListener('input', function(e) {
      const v = e.target.value.replace(/[^0-9.]/g, '');
      if (!v) { e.target.value = ''; update(); return; }
      const parts = v.split('.');
      const int = (parts[0].replace(/^0+(?=\d)/, '') || '0').replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      e.target.value = parts.length > 1 ? int + '.' + parts[1] : int;
      update();
    });
    document.getElementById('filing').addEventListener('change', update);
    document.getElementById('freq').addEventListener('change', update);

    update();
  </script>
</body>
</html>
